name: build

on:
  push:
    branches:
      - master

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/mpv-android/mpv-android.git
          git fetch upstream master
          # Check if upstream has new commits not in our branch
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Already up-to-date with upstream, nothing to merge"
          else
            if git merge upstream/master -m "Merge upstream mpv-android/master [skip ci]" --no-ff --no-edit; then
              git push origin master
              echo "Merged upstream successfully"
            else
              echo "Merge conflict, aborting"
              git merge --abort
            fi
          fi

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download or build deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build
        run: |
          buildscripts/include/ci.sh build

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android
          path: app/build/outputs/apk/default/debug/app-default-arm64-v8a-debug.apk
