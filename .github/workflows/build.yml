name: build

on:
  push:
    branches:
      - master

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/mpv-android/mpv-android.git
          git fetch upstream master
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Already up-to-date with upstream, nothing to merge"
          else
            if git merge upstream/master -m "Merge upstream mpv-android/master [skip ci]" --no-ff --no-edit; then
              git push origin master
              echo "Merged upstream successfully"
            else
              echo "Merge conflict, aborting"
              git merge --abort
            fi
          fi

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download or build deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      # Restore cached release keystore (persists across runs for cover install)
      - uses: actions/cache/restore@v5
        id: keystore-cache
        with:
          path: keystore.jks
          key: release-keystore-v1

      - name: Prepare keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "from_secret=true" >> $GITHUB_OUTPUT
            echo "Keystore decoded from secret"
          elif [ ! -f keystore.jks ]; then
            keytool -genkey -v -keystore keystore.jks \
              -alias mpv -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=mpv-android-tokyonight,O=CI,C=US"
            echo "from_secret=false" >> $GITHUB_OUTPUT
            echo "Generated new release keystore"
          else
            echo "from_secret=false" >> $GITHUB_OUTPUT
            echo "Using cached release keystore"
          fi
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=mpv" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      # Save auto-generated keystore for next run
      - if: steps.keystore-cache.outputs.cache-hit != 'true' && steps.keystore.outputs.from_secret != 'true'
        uses: actions/cache/save@v5
        with:
          path: keystore.jks
          key: release-keystore-v1

      - name: Build
        run: buildscripts/include/ci.sh build

      - name: Sign release APK
        run: |
          SDK_DIR="buildscripts/sdk/android-sdk-linux"
          APKSIGNER="$SDK_DIR/build-tools/35.0.0/apksigner"
          UNSIGNED="app/build/outputs/apk/default/release/app-default-arm64-v8a-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/default/release/app-default-arm64-v8a-release.apk"
          if [ -f keystore.jks ] && [ -f "$UNSIGNED" ]; then
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-pass pass:android \
              --ks-key-alias mpv \
              --key-pass pass:android \
              --in "$UNSIGNED" \
              --out "$SIGNED"
            echo "Signed: $SIGNED"
          else
            echo "No keystore or unsigned APK, skipping signing"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android
          path: |
            app/build/outputs/apk/default/debug/app-default-arm64-v8a-debug.apk
            app/build/outputs/apk/default/release/app-default-arm64-v8a-release.apk
            app/build/outputs/apk/default/release/app-default-arm64-v8a-release-unsigned.apk
